version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: frandee_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: frandee
      POSTGRES_PASSWORD: frandee_pass
      POSTGRES_DB: frandee
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frandee -d frandee"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frandee_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Local dev: DATABASE_URL and DIRECT_URL point at the same local Postgres.
      # In production on Supabase they differ (pooled vs direct). See backend/.env.example.
      DATABASE_URL: postgres://frandee:frandee_pass@db:5432/frandee
      DIRECT_URL: postgres://frandee:frandee_pass@db:5432/frandee
      JWT_SECRET: dev_local_secret_change_me_64chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      PORT: "4000"
      FORCE_HTTPS: "false"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      CONTACT_TO: "info@frandeeconsult.com"
      SENTRY_DSN: ""
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run start"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frandee_web
    restart: unless-stopped
    depends_on:
      - api
